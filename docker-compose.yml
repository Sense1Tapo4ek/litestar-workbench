services:
  platform:
    build: .
    ports:
      - "8000:8000"
      - "8200:8200"
    environment:
      S1T_HOST: "0.0.0.0"
      S1T_PORT: "8000"
      S1T_VALKEY_URL: "valkey://valkey:6379"
      S1T_RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/learn_litestar"
    depends_on:
      valkey:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - workspaces:/app/.workspaces

  valkey:
    image: valkey/valkey:alpine
    ports:
      - "6379:6379"
    volumes:
      - ./docker_compose_vol/valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    depends_on:
      - valkey

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - ./docker_compose_vol/rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: learn_litestar
    volumes:
      - ./docker_compose_vol/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker_compose_vol/pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  workspaces:
  valkey_data:
  rabbitmq_data:
  postgres_data:
  pgadmin_data: