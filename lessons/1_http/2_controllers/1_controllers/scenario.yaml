steps:
  - name: "Empty list"
    method: GET
    path: /items
    expect_status: 200
    description: "GET /items возвращает [] — хранилище пусто"

  - name: "Create item"
    method: POST
    path: /items
    body:
      name: "Чистый код"
      price: 29.99
    expect_status: 201
    description: "POST /items возвращает созданный Item с id"
    save_as: item

  - name: "Get by ID"
    method: GET
    path: "/items/${item.id}"
    expect_status: 200
    description: "GET /items/{id} возвращает конкретный Item"

  - name: "Nonexistent ID"
    method: GET
    path: /items/9999
    expect_status: 404
    description: "Несуществующий ID → 404"

  - name: "Delete"
    method: DELETE
    path: "/items/${item.id}"
    expect_status: 204
    description: "DELETE /items/{id} удаляет Item и возвращает 204"
