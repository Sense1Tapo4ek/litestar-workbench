steps:
  - name: "Visit"
    method: GET
    path: /
    expect_status: 200
    description: "visits=1 после первого запроса, 2 после второго"

  - name: "Stats"
    method: GET
    path: /stats
    expect_status: 200
    description: "total_visits=2 — тот же State доступен из другого хендлера"

  - name: "Reset counter"
    method: GET
    path: /reset
    expect_status: 200
    description: "visits=0 после сброса"

  - name: "After reset"
    method: GET
    path: /stats
    expect_status: 200
    description: "total_visits=0 — сброс виден глобально"
